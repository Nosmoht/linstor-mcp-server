name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: "v2.9.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/linstor-mcp-server_*.tar.gz
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/

  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare platform packages
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          declare -A MAPPING=(
            ["linux_amd64"]="linux-x64"
            ["linux_arm64"]="linux-arm64"
            ["darwin_amd64"]="darwin-x64"
            ["darwin_arm64"]="darwin-arm64"
          )

          for go_platform in "${!MAPPING[@]}"; do
            npm_dir="${MAPPING[$go_platform]}"
            archive="dist/linstor-mcp-server_${VERSION}_${go_platform}.tar.gz"

            echo "--- Preparing @linstor-mcp/${npm_dir} from ${archive}"
            mkdir -p "npm/${npm_dir}/bin"
            tar -xzf "${archive}" -C "npm/${npm_dir}/bin/" linstor-mcp-server
            chmod +x "npm/${npm_dir}/bin/linstor-mcp-server"

            cd "npm/${npm_dir}"
            npm version "${VERSION}" --no-git-tag-version --allow-same-version
            cd ../..
          done

      - name: Set version in main package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd npm/linstor-mcp
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '${VERSION}';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages
        run: |
          for dir in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            echo "--- Publishing @linstor-mcp/${dir}"
            cd "npm/${dir}"
            npm publish --access public --provenance
            cd ../..
          done

      - name: Publish main package
        run: |
          cd npm/linstor-mcp
          npm publish --access public --provenance
