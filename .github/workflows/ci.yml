name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '*.go'
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
              - '.goreleaser.yaml'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11

  verify:
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
      - run: go mod verify
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  test:
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
      - run: go test -v -race -coverprofile=coverage.out -coverpkg=./... ./...
      - run: go tool cover -func=coverage.out
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
      - run: make build

  validate-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
      - run: jq empty server.json
      - run: jq empty npm/linstor-mcp/package.json
      - run: jq empty npm/linux-x64/package.json
      - run: jq empty npm/linux-arm64/package.json
      - run: jq empty npm/darwin-x64/package.json
      - run: jq empty npm/darwin-arm64/package.json
      - run: node --check npm/linstor-mcp/bin/run.js

  merge-guard:
    if: always() && !cancelled()
    needs: [lint, test, build, verify, validate-metadata]
    runs-on: ubuntu-latest
    steps:
      - name: Fail on CI failure or cancellation
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "CI failed: one or more jobs failed or were cancelled"
          exit 1
      - name: Report CI status
        run: |
          echo "All CI jobs passed or were skipped (no Go-relevant files changed)" \
            | tee -a "$GITHUB_STEP_SUMMARY"
