name: auto-tag

on:
  push:
    branches: [main]
    paths:
      - '*.go'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.goreleaser.yaml'

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check release automation configuration
        id: config
        env:
          RELEASE_APP_ID: ${{ vars.RELEASE_APP_ID }}
          RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$RELEASE_APP_ID" ] && [ -n "$RELEASE_APP_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping auto-tag: RELEASE_APP_ID or RELEASE_APP_PRIVATE_KEY is not configured." \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        if: steps.config.outputs.enabled == 'true'
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        if: steps.config.outputs.enabled == 'true'
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        if: steps.config.outputs.enabled == 'true'
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          default_bump: false
          tag_prefix: "v"
          fetch_all_tags: true
