name: issue-triage

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  triage-audit:
    runs-on: ubuntu-latest
    if: >-
      contains(
        toJSON(github.event.issue.labels.*.name),
        'audit'
      )
    steps:
      - name: Check governance automation configuration
        id: config
        env:
          RELEASE_APP_ID: ${{ vars.RELEASE_APP_ID }}
          RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$RELEASE_APP_ID" ] && [ -n "$RELEASE_APP_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping issue triage: GitHub App credentials are not configured." \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        if: steps.config.outputs.enabled == 'true'
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        if: steps.config.outputs.enabled == 'true'
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const match = body.match(/###\s*Severity\s*\n\s*(P[0-3])/);

            let labelToAdd;
            if (match) {
              const severity = match[1];
              const severityToLabel = {
                P0: 'priority: P0',
                P1: 'priority: P1',
                P2: 'priority: P2',
                P3: 'priority: P3',
              };
              labelToAdd = severityToLabel[severity];
            }

            if (!labelToAdd) {
              core.info('No severity match found. Applying needs: triage.');
              labelToAdd = 'needs: triage';
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [labelToAdd],
            });

            core.info(`Applied label: ${labelToAdd}`);
