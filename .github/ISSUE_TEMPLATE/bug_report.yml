name: Bug Report
description: Report a bug in linstor-mcp-server
labels: ["bug", "status: ready"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the sections below to help us triage it quickly.
  - type: input
    id: version
    attributes:
      label: linstor-mcp-server version
      description: "Output of `linstor-mcp-server --version` or the npm package version"
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport mode
      options:
        - stdio
        - HTTP (streamable, beta)
    validations:
      required: true
  - type: input
    id: mcp-client
    attributes:
      label: MCP client
      description: "Which MCP client are you using?"
      placeholder: "Claude Code, Codex CLI, etc."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Clear description of the bug"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
    validations:
      required: false
